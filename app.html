<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#1D9E75">
  <title>Marcador de Consumo Alimentar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="app-page">

  <!-- ══════════════════════════════════════════════════════════════════
       HEADER
       ══════════════════════════════════════════════════════════════════ -->
  <header class="header">
    <div class="header-inner">
      <div class="user-info"><i class="ti ti-user-circle"></i> <span id="user-email"></span></div>
      <div class="header-top">
        <div class="header-title"><i class="ti ti-clipboard-heart"></i> Marcador de Consumo</div>
        <div class="header-right">
          <span class="counter-pill" id="counter-pill">0</span>
          <button class="btn-logout" onclick="handleLogout()"><i class="ti ti-logout"></i> Sair</button>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-label" id="progress-label">0 fichas lançadas</div>
    </div>
  </header>

  <!-- ══════════════════════════════════════════════════════════════════
       TABS
       ══════════════════════════════════════════════════════════════════ -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('nova')"><i class="ti ti-plus"></i> Nova avaliação</button>
    <button class="tab" onclick="showTab('hist')"><i class="ti ti-history"></i> Histórico</button>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════
       CONTENT
       ══════════════════════════════════════════════════════════════════ -->
  <div class="content">

    <!-- ── Tab: Nova avaliação ─────────────────────────────────────── -->
    <div class="section active" id="sec-nova">

      <!-- Dados da família -->
      <div class="card">
        <div class="card-title">Dados da Família</div>
        <div class="field">
          <label>Família <span class="required">*</span></label>
          <input type="text" id="familia" placeholder="Nome ou código da família">
        </div>
        <div class="field">
          <label>Nº de pessoas a avaliar <span class="required">*</span></label>
          <input type="number" id="qtd" min="1" max="30" placeholder="Ex: 4" oninput="gerarFichas()">
        </div>
      </div>

      <!-- Fichas (generated dynamically) -->
      <div id="fichas-container"></div>

      <!-- Botão Salvar -->
      <button class="btn-save" id="btn-salvar" onclick="salvar()">
        <div class="spinner" id="save-spinner"></div>
        <span><i class="ti ti-device-floppy"></i> Salvar avaliação</span>
      </button>
    </div>

    <!-- ── Tab: Histórico ──────────────────────────────────────────── -->
    <div class="section" id="sec-hist">

      <!-- Export bar -->
      <div class="export-bar">
        <button class="btn-export" onclick="exportCSV()"><i class="ti ti-file-spreadsheet"></i> Exportar CSV</button>
        <button class="btn-export" onclick="exportJSON()"><i class="ti ti-file-code"></i> Exportar JSON</button>
      </div>

      <!-- Stats -->
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-num" id="st-total">0</div><div class="stat-lbl">Total de fichas</div></div>
        <div class="stat-card highlight"><div class="stat-num" id="st-lancadas">0</div><div class="stat-lbl">Lançadas</div></div>
        <div class="stat-card"><div class="stat-num" id="st-familias">0</div><div class="stat-lbl">Famílias</div></div>
        <div class="stat-card"><div class="stat-num" id="st-mes">0</div><div class="stat-lbl">Este mês</div></div>
      </div>

      <!-- History cards -->
      <div id="historico"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════
       MODAL — Visualizar Ficha
       ══════════════════════════════════════════════════════════════════ -->
  <div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">Ficha</div>
        <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════
       CONFIRM DIALOG
       ══════════════════════════════════════════════════════════════════ -->
  <div class="confirm-overlay hidden" id="confirm-overlay">
    <div class="confirm-box">
      <div class="confirm-icon"><i class="ti ti-alert-triangle"></i></div>
      <div class="confirm-title" id="confirm-title">Excluir?</div>
      <div class="confirm-text" id="confirm-text">Esta ação não pode ser desfeita.</div>
      <div class="confirm-actions">
        <button class="confirm-btn cancel" onclick="closeConfirm()">Cancelar</button>
        <button class="confirm-btn danger" id="confirm-action">Excluir</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════
       TOAST
       ══════════════════════════════════════════════════════════════════ -->
  <div class="toast" id="toast"></div>

  <!-- ══════════════════════════════════════════════════════════════════
       SCRIPTS
       ══════════════════════════════════════════════════════════════════ -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
